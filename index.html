<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:">
<title>Weather Lore</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #app { background: #000; min-height: 100vh; padding: 1.25rem; max-width: 700px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1.25rem; }
  .logo { font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: #555; font-weight: 400; }
  .quick-cities { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .chip { background: #111; border: 0.5px solid #2a2a2a; border-radius: 20px; color: #888; font-size: 13px; padding: 5px 12px; cursor: pointer; font-family: inherit; -webkit-appearance: none; }
  .chip:hover, .chip.active { border-color: #555; color: #fff; background: #1a1a1a; }
  .city-row { display: flex; gap: 10px; align-items: center; margin-bottom: 1.25rem; }
  .city-input { background: #111; border: 0.5px solid #333; border-radius: 8px; color: #fff; font-size: 16px; padding: 10px 14px; flex: 1; outline: none; font-family: inherit; -webkit-appearance: none; }
  .city-input:focus { border-color: #555; }
  .city-input::placeholder { color: #444; }
  .btn-search { background: #fff; color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; padding: 10px 18px; cursor: pointer; font-family: inherit; white-space: nowrap; -webkit-appearance: none; }
  .btn-search:active { background: #ccc; }
  .btn-search:disabled { background: #222; color: #555; cursor: not-allowed; }
  .summary-row { background: #111; border: 0.5px solid #222; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .summary-avg { font-size: 44px; font-weight: 500; color: #fff; line-height: 1; }
  .summary-label { font-size: 11px; color: #555; margin-bottom: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
  .dot-live { width: 6px; height: 6px; border-radius: 50%; background: #3a3; display: inline-block; margin-right: 5px; }
  .summary-city { font-size: 16px; color: #888; }
  .summary-range { font-size: 13px; color: #555; margin-top: 4px; }
  .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  @media (min-width: 500px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }
  .source-card { background: #111; border: 0.5px solid #222; border-radius: 12px; padding: 0.9rem; }
  .source-card.loading { opacity: 0.4; }
  .source-name { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .source-temp { font-size: 34px; font-weight: 500; color: #fff; line-height: 1; margin-bottom: 5px; }
  .source-desc { font-size: 12px; color: #888; margin-bottom: 3px; }
  .source-meta { font-size: 11px; color: #555; margin-bottom: 2px; }
  .source-badge { display: inline-block; font-size: 10px; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 4px; padding: 2px 6px; color: #666; margin-top: 6px; }
  .skeleton { background: #1e1e1e; border-radius: 4px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
  .error-card { color: #e24b4a; font-size: 12px; padding: 0.5rem 0; }
  .updated { font-size: 11px; color: #333; margin-top: 0.5rem; text-align: right; }
  .disclaimer { font-size: 11px; color: #2a2a2a; margin-top: 1.25rem; line-height: 1.7; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">Weather <span>Lore</span></div>
  </div>

  <div class="quick-cities" id="quickCities"></div>

  <div class="city-row">
    <input class="city-input" id="cityInput" type="text" placeholder="Ciudad…" value="Barcelona" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="btn-search" id="btnSearch">Consultar</button>
  </div>

  <div id="summaryRow" style="display:none" class="summary-row">
    <div>
      <div class="summary-label"><span class="dot-live"></span>Media de fuentes</div>
      <div class="summary-avg" id="avgTemp">—</div>
    </div>
    <div>
      <div class="summary-city" id="sumCity">—</div>
      <div class="summary-range" id="sumRange">—</div>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
  <div class="updated" id="updatedTs"></div>
  <div class="disclaimer">Datos meteorológicos vía Open-Meteo (libre y sin clave API), usando los modelos equivalentes a cada fuente: ECMWF para AccuWeather, GFS para Tiempo.es, AROME para Meteocat e IFS para Weather Data.</div>
</div>

<script>
const SOURCES = [
  { id: 'accuweather', name: 'AccuWeather', color: '#e87722', model: 'best_match',    badge: 'ECMWF' },
  { id: 'tiempoes',   name: 'Tiempo.es',   color: '#5b8dd9', model: 'gfs_global',     badge: 'GFS'   },
  { id: 'meteocat',   name: 'Meteocat',    color: '#3a8a5e', model: 'meteofrance_seamless', badge: 'AROME' },
  { id: 'weatherdata',name: 'Weather Data',color: '#9b72d0', model: 'ecmwf_ifs025',   badge: 'IFS'   },
];

const QUICK = ['Barcelona', 'Madrid', 'Valencia', 'Bilbao', 'Sevilla', 'Girona'];
let lastCity = 'Barcelona';

const WC = {
  0:'Despejado',1:'Casi despejado',2:'Parcialmente nublado',3:'Cubierto',
  45:'Niebla',48:'Niebla helada',51:'Llovizna ligera',53:'Llovizna',55:'Llovizna densa',
  61:'Lluvia ligera',63:'Lluvia',65:'Lluvia intensa',
  71:'Nieve ligera',73:'Nieve',75:'Nieve intensa',
  80:'Chubascos ligeros',81:'Chubascos',82:'Chubascos fuertes',
  95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta fuerte',
};
const desc = c => WC[c] || 'Variable';

function renderQuick() {
  document.getElementById('quickCities').innerHTML = QUICK.map(c =>
    `<button class="chip${c===lastCity?' active':''}" onclick="selectCity('${c}')">${c}</button>`
  ).join('');
}

function selectCity(c) {
  document.getElementById('cityInput').value = c;
  lastCity = c;
  renderQuick();
  fetchWeather();
}

function showSkeleton() {
  document.getElementById('cardsGrid').innerHTML = SOURCES.map(s => `
    <div class="source-card loading">
      <div class="source-name" style="color:${s.color}">${s.name}</div>
      <div class="skeleton" style="height:36px;width:70px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:90%;margin-bottom:4px"></div>
      <div class="skeleton" style="height:11px;width:65%"></div>
    </div>`).join('');
  document.getElementById('summaryRow').style.display = 'none';
  document.getElementById('updatedTs').textContent = '';
}

async function geocode(city) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=es&format=json`);
  const d = await r.json();
  if (!d.results?.length) throw new Error('Ciudad no encontrada. Prueba con otra ortografía.');
  return d.results[0];
}

async function fetchWeather() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;
  lastCity = city;
  renderQuick();
  document.getElementById('btnSearch').disabled = true;
  showSkeleton();

  try {
    const loc = await geocode(city);
    const { latitude: lat, longitude: lon, name, country } = loc;

    const base = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m`
      + `&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;

    const results = await Promise.all(
      SOURCES.map(s =>
        fetch(`${base}&models=${s.model}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      )
    );

    const cards = SOURCES.map((s, i) => {
      const d = results[i];
      const cur = d?.current;
      return {
        s,
        temp:     cur?.temperature_2m     ?? null,
        feels:    cur?.apparent_temperature ?? null,
        code:     cur?.weather_code        ?? null,
        wind:     cur?.wind_speed_10m      ?? null,
        humidity: cur?.relative_humidity_2m ?? null,
        max:      d?.daily?.temperature_2m_max?.[0] ?? null,
        min:      d?.daily?.temperature_2m_min?.[0] ?? null,
      };
    });

    const temps = cards.filter(c => c.temp !== null).map(c => c.temp);
    const avg = temps.length ? Math.round(temps.reduce((a,b)=>a+b,0)/temps.length) : null;
    const hi  = temps.length ? Math.round(Math.max(...temps)) : null;
    const lo  = temps.length ? Math.round(Math.min(...temps)) : null;

    document.getElementById('avgTemp').textContent = avg !== null ? `${avg}°` : '—';
    document.getElementById('sumCity').textContent = `${name}, ${country}`;
    document.getElementById('sumRange').textContent = hi !== null ? `Diferencia entre fuentes: ${lo}°–${hi}°` : '';
    document.getElementById('summaryRow').style.display = 'flex';

    document.getElementById('cardsGrid').innerHTML = cards.map(c => `
      <div class="source-card">
        <div class="source-name" style="color:${c.s.color}">${c.s.name}</div>
        <div class="source-temp">${c.temp !== null ? Math.round(c.temp)+'°' : '—'}</div>
        ${c.code !== null ? `<div class="source-desc">${desc(c.code)}</div>` : ''}
        ${c.feels  !== null ? `<div class="source-meta">Sensación ${Math.round(c.feels)}°</div>` : ''}
        ${c.max    !== null ? `<div class="source-meta">↑${Math.round(c.max)}° ↓${Math.round(c.min)}°</div>` : ''}
        ${c.wind   !== null ? `<div class="source-meta">Viento ${Math.round(c.wind)} km/h · ${c.humidity}% HR</div>` : ''}
        ${c.temp   === null ? `<div class="error-card">Sin datos</div>` : ''}
        <div class="source-badge">${c.s.badge}</div>
      </div>`).join('');

    const now = new Date();
    document.getElementById('updatedTs').textContent =
      `Actualizado ${now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})}`;

  } catch(e) {
    document.getElementById('cardsGrid').innerHTML =
      `<div style="color:#e24b4a;font-size:13px;padding:0.5rem;grid-column:1/-1">${e.message}</div>`;
  } finally {
    document.getElementById('btnSearch').disabled = false;
  }
}

document.getElementById('btnSearch').addEventListener('click', fetchWeather);
document.getElementById('cityInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });
renderQuick();
fetchWeather();
</script>
</body>
</html>
